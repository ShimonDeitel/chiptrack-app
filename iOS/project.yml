name: Windshield Chip Tracker
options:
  bundleIdPrefix: com.shimondeitel.chiptrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Windshield Chip Tracker:
    type: application
    platform: iOS
    sources:
      - path: Windshield Chip Tracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chiptrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Windshield Chip Tracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Windshield Chip TrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Windshield Chip TrackerTests
      - path: Windshield Chip Tracker.storekit
    dependencies:
      - target: Windshield Chip Tracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chiptrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Windshield Chip TrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Windshield Chip TrackerUITests
    dependencies:
      - target: Windshield Chip Tracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chiptrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Windshield Chip Tracker:
    build:
      targets:
        Windshield Chip Tracker: all
        Windshield Chip TrackerTests: [test]
        Windshield Chip TrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Windshield Chip Tracker.storekit
    test:
      config: Debug
      storeKitConfiguration: Windshield Chip Tracker.storekit
      targets:
        - Windshield Chip TrackerTests
        - Windshield Chip TrackerUITests
    archive:
      config: Release
